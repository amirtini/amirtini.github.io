<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Размытие GIF-фона</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background-faded-stains-light-680172.jpg'); /* Убедитесь, что файл находится в той же папке */
            background-size: cover;
            filter: blur(8px); /* Уровень размытия */
            z-index: 1; /* Помещаем фон за контентом */
        }

        .content {
            position: relative;
            z-index: 1; /* Контент выше фона */
            color: white; /* Цвет текста */
            text-align: center;
            padding-top: 20%;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <h1>Добро пожаловать на мой сайт!</h1>
        <p>Это пример размытого GIF-фона.</p>
    </div>
</body>
</html>
